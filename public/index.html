<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4F46E5" /> <!-- Modern Indigo Theme -->
    <meta
      name="description"
      content="StudyGPT - Your AI-powered study companion."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Google Fonts: Inter is great for clean UI -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN (Optional, but makes styling much faster) -->
    <script src="https://tailwindcss.com"></script>

    <title>StudyGPT | AI Study Assistant</title>

    <style>
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f9fafb; /* Light subtle grey background */
        color: #111827;
      }

      /* Custom scrollbar for a more modern feel */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #c7d2fe;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #818cf8;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run StudyGPT.</noscript>
    
    <!-- This is where your React App lives -->
    <div id="root"></div>

  </body>
</html>
